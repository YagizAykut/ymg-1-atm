<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Uygulaması</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .atm-container { background-color: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        .screen { background-color: #ecf0f1; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 2px solid #bdc3c7; min-height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #2c3e50; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        .btn-check { background-color: #3498db; color: white; }
        .btn-deposit { background-color: #2ecc71; color: white; }
        .btn-withdraw { background-color: #e74c3c; color: white; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="atm-container">
    <h2>Bankamatik</h2>
    <div id="output" class="screen">Hoş Geldiniz!</div>
    
    <input type="text" id="hesapNo" placeholder="Hesap Numarası (Örn: 11112222)" value="11112222">
    <input type="number" id="miktar" placeholder="Miktar (TL)">

    <button class="btn-check" onclick="bakiyeSorgula()" style="width:100%; margin-bottom:10px;">Bakiye Sorgula</button>
    
    <div class="btn-group">
        <button class="btn-deposit" onclick="islemYap('para-yatir')">Para Yatır</button>
        <button class="btn-withdraw" onclick="islemYap('para-cek')">Para Çek</button>
    </div>
</div>

<script>
    // Docker'da backend 8080 portunda çalışıyor olacak
    const API_URL = "http://localhost:8080/api/atm";

    async function bakiyeSorgula() {
        const hesapNo = document.getElementById('hesapNo').value;
        try {
            const response = await fetch(`${API_URL}/bakiye/${hesapNo}`);
            const data = await response.json();
            if(response.ok) {
                goster(`Hesap: ${data.hesapNo} <br> Bakiye: ${data.guncelBakiye} TL`);
            } else {
                goster("Hata: " + (data.message || "Hesap bulunamadı"));
            }
        } catch (error) {
            goster("Bağlantı Hatası!");
        }
    }

    async function islemYap(tip) {
        const hesapNo = document.getElementById('hesapNo').value;
        const miktar = document.getElementById('miktar').value;
        
        // Basitlik için PIN'i sabit '1234' yolluyoruz (Backend kontrolü için)
        const payload = tip === 'para-cek' 
            ? { hesapNo, miktar: parseFloat(miktar), pin: "1234" }
            : { hesapNo, miktar: parseFloat(miktar) };

        try {
            const response = await fetch(`${API_URL}/${tip}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            
            if(response.ok) {
                goster(`İşlem Başarılı! <br> Yeni Bakiye: ${data.yeni_bakiye || data.guncelBakiye} TL`);
            } else {
                goster("Hata: " + (data.message || "İşlem başarısız"));
            }
        } catch (error) {
            goster("Bağlantı Hatası!");
        }
    }

    function goster(mesaj) {
        document.getElementById('output').innerHTML = mesaj;
    }
</script>

</body>
</html>
